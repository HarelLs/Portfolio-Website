<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- circle top -->
  <rect fill="#fff" x="4" y="1" width="8" height="1"/>
  <rect fill="#fff" x="2" y="2" width="12" height="1"/>
  <!-- solid upper third -->
  <rect fill="#fff" x="1" y="3" width="14" height="3"/>
  <!-- arc 1 — widest gap (cols 3–12), sides only -->
  <rect fill="#fff" x="1" y="6" width="2" height="1"/>
  <rect fill="#fff" x="13" y="6" width="2" height="1"/>
  <!-- solid row -->
  <rect fill="#fff" x="1" y="7" width="14" height="1"/>
  <!-- arc 2 — medium gap (cols 3–10) -->
  <rect fill="#fff" x="1" y="8" width="2" height="1"/>
  <rect fill="#fff" x="11" y="8" width="4" height="1"/>
  <!-- solid row -->
  <rect fill="#fff" x="1" y="9" width="14" height="1"/>
  <!-- arc 3 — narrowest gap (cols 3–8) -->
  <rect fill="#fff" x="1" y="10" width="2" height="1"/>
  <rect fill="#fff" x="9" y="10" width="6" height="1"/>
  <!-- solid lower section -->
  <rect fill="#fff" x="1" y="11" width="14" height="2"/>
  <!-- circle bottom -->
  <rect fill="#fff" x="2" y="13" width="12" height="1"/>
  <rect fill="#fff" x="4" y="14" width="8" height="1"/>
</svg>
