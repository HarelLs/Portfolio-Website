<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- leaf (upper right of stem) -->
  <rect fill="#fff" x="10" y="0" width="2" height="1"/>
  <rect fill="#fff" x="9" y="1" width="3" height="1"/>
  <!-- stem -->
  <rect fill="#fff" x="9" y="2" width="1" height="1"/>
  <!-- two lobes at top of apple body -->
  <rect fill="#fff" x="2" y="3" width="5" height="1"/>
  <rect fill="#fff" x="10" y="3" width="4" height="1"/>
  <!-- body row 4: lobes join, bite starting (cols 14–15 removed) -->
  <rect fill="#fff" x="1" y="4" width="13" height="1"/>
  <!-- bite row 5: deepest (cols 12–15 removed) -->
  <rect fill="#fff" x="0" y="5" width="12" height="1"/>
  <!-- bite row 6: (cols 13–15 removed) -->
  <rect fill="#fff" x="0" y="6" width="13" height="1"/>
  <!-- bite row 7: (cols 14–15 removed) -->
  <rect fill="#fff" x="0" y="7" width="14" height="1"/>
  <!-- full-width body -->
  <rect fill="#fff" x="0" y="8" width="16" height="3"/>
  <!-- narrowing towards bottom -->
  <rect fill="#fff" x="1" y="11" width="14" height="1"/>
  <rect fill="#fff" x="2" y="12" width="12" height="1"/>
  <rect fill="#fff" x="4" y="13" width="8" height="1"/>
</svg>
