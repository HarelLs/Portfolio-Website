<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- rounded rect top edge -->
  <rect fill="#fff" x="2" y="2" width="12" height="1"/>
  <!-- full-width solid rows (above triangle) -->
  <rect fill="#fff" x="0" y="3" width="16" height="1"/>
  <!-- triangle cutout rows — left solid + right solid, gap = transparent play triangle -->
  <!-- row 4: tip (gap at col 4 only) -->
  <rect fill="#fff" x="0" y="4" width="4" height="1"/>
  <rect fill="#fff" x="5" y="4" width="11" height="1"/>
  <!-- row 5: gap cols 4–6 -->
  <rect fill="#fff" x="0" y="5" width="4" height="1"/>
  <rect fill="#fff" x="7" y="5" width="9" height="1"/>
  <!-- row 6: gap cols 4–9 -->
  <rect fill="#fff" x="0" y="6" width="4" height="1"/>
  <rect fill="#fff" x="10" y="6" width="6" height="1"/>
  <!-- rows 7–8: widest gap (cols 4–12), right tip of triangle -->
  <rect fill="#fff" x="0" y="7" width="4" height="2"/>
  <rect fill="#fff" x="13" y="7" width="3" height="2"/>
  <!-- row 9: gap cols 4–9 (mirror of row 6) -->
  <rect fill="#fff" x="0" y="9" width="4" height="1"/>
  <rect fill="#fff" x="10" y="9" width="6" height="1"/>
  <!-- row 10: gap cols 4–6 (mirror of row 5) -->
  <rect fill="#fff" x="0" y="10" width="4" height="1"/>
  <rect fill="#fff" x="7" y="10" width="9" height="1"/>
  <!-- row 11: tip (gap at col 4 only, mirror of row 4) -->
  <rect fill="#fff" x="0" y="11" width="4" height="1"/>
  <rect fill="#fff" x="5" y="11" width="11" height="1"/>
  <!-- full-width solid rows (below triangle) -->
  <rect fill="#fff" x="0" y="12" width="16" height="1"/>
  <!-- rounded rect bottom edge -->
  <rect fill="#fff" x="2" y="13" width="12" height="1"/>
</svg>
